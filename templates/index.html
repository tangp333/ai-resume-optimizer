<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 简历优化器</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #a855f7;
            --bg: #fafbfe;
            --surface: #ffffff;
            --text: #0f172a;
            --text-2: #475569;
            --text-3: #94a3b8;
            --border: #e2e8f0;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --r: 20px;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-2: #94a3b8;
            --text-3: #64748b;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }
        [data-theme="dark"] .nav { background: rgba(15,23,42,0.85); border-bottom-color: #1e293b; }
        [data-theme="dark"] .panel { background: #1e293b; border-color: #334155; }
        [data-theme="dark"] textarea { background: #0f172a; border-color: #334155; color: #f1f5f9; }
        [data-theme="dark"] textarea:focus { background: #1e293b; }
        [data-theme="dark"] .dropzone { background: #1e293b; border-color: #334155; }
        [data-theme="dark"] .dim { background: #0f172a; }
        [data-theme="dark"] .dim-track { background: #334155; }
        [data-theme="dark"] .tab-bar { background: #1e293b; }
        [data-theme="dark"] .tab-btn.on { background: #334155; }
        [data-theme="dark"] .score-desc { background: #1e293b; }
        [data-theme="dark"] .kw-tip { background: #1e293b; border-color: #334155; color: #fbbf24; }
        [data-theme="dark"] .btn-sm { background: #1e293b; border-color: #334155; color: #94a3b8; }
        [data-theme="dark"] .btn-sm:hover { border-color: var(--primary); color: var(--primary); background: #1e293b; }
        [data-theme="dark"] .file-tag { background: #1e293b; }
        [data-theme="dark"] .md-body code { background: #1e293b; }
        [data-theme="dark"] .hero::before { background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%); }

        /* ========== NAV ========== */
        .nav {
            position: sticky; top: 0; z-index: 99;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            padding: 0 40px;
            height: 56px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 800; font-size: 1.1em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-brand img { width: 28px; height: 28px; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a {
            color: var(--text-2); text-decoration: none;
            padding: 6px 14px; border-radius: 8px; font-size: 0.88em; font-weight: 500;
            transition: all 0.15s;
        }
        .nav-links a:hover { background: #f1f5f9; color: var(--primary); }

        /* ========== HERO ========== */
        .hero {
            text-align: center;
            padding: 72px 24px 40px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute; top: -120px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero h1 {
            font-size: 3em; font-weight: 800; letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e1b4b, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .hero p { color: var(--text-2); font-size: 1.15em; max-width: 520px; margin: 0 auto; line-height: 1.6; }

        .feature-pills {
            display: flex; justify-content: center; gap: 10px; margin-top: 28px; flex-wrap: wrap;
        }
        .pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 100px;
            font-size: 0.82em; font-weight: 600;
            border: 1px solid; transition: transform 0.15s;
        }
        .pill:hover { transform: translateY(-2px); }
        .pill.purple { background: #f5f3ff; border-color: #ddd6fe; color: #7c3aed; }
        .pill.green { background: #f0fdf4; border-color: #bbf7d0; color: #16a34a; }
        .pill.amber { background: #fffbeb; border-color: #fde68a; color: #d97706; }
        .pill.rose { background: #fff1f2; border-color: #fecdd3; color: #e11d48; }

        /* ========== MAIN ========== */
        .main { max-width: 1120px; margin: 0 auto; padding: 0 24px 60px; }

        /* ========== INPUT ========== */
        .input-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) { .input-row { grid-template-columns: 1fr; } }

        .panel {
            background: var(--surface); border-radius: var(--r);
            border: 1px solid var(--border);
            padding: 24px; position: relative;
            transition: box-shadow 0.2s;
        }
        .panel:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
        .panel-head {
            display: flex; align-items: center; gap: 8px;
            font-weight: 700; font-size: 0.95em; margin-bottom: 16px;
        }
        .panel-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1em;
        }
        .panel-icon.blue { background: #eff6ff; color: #3b82f6; }
        .panel-icon.purple { background: #f5f3ff; color: #7c3aed; }

        .dropzone {
            border: 2px dashed #cbd5e1; border-radius: 14px;
            padding: 20px; text-align: center; cursor: pointer;
            transition: all 0.2s; background: #f8fafc;
            margin-bottom: 12px;
        }
        .dropzone:hover, .dropzone.drag-over {
            border-color: var(--primary); background: #f0f0ff;
        }
        .dropzone i { font-size: 1.6em; color: var(--primary); margin-bottom: 4px; }
        .dropzone p { font-size: 0.82em; color: var(--text-3); margin-top: 2px; }
        .dropzone input { display: none; }
        .file-tag {
            display: none; margin-top: 8px;
            padding: 6px 12px; background: #ede9fe; border-radius: 8px;
            font-size: 0.8em; color: var(--primary); font-weight: 500;
        }

        textarea {
            width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
            padding: 14px 16px; font-size: 0.9em; font-family: inherit;
            resize: vertical; min-height: 180px;
            transition: border-color 0.15s, box-shadow 0.15s;
            line-height: 1.7; color: var(--text);
            background: #fafbfe;
        }
        textarea::placeholder { color: var(--text-3); }
        textarea:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.08);
            background: #fff;
        }

        .extra-trigger {
            margin-top: 10px; font-size: 0.85em; color: var(--primary);
            cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 4px;
        }
        .extra-trigger:hover { text-decoration: underline; }
        .extra-jds { display: none; margin-top: 12px; }
        .extra-jds.open { display: block; }

        /* ========== BUTTON ========== */
        .btn-go {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-size: 1.05em; font-weight: 700; cursor: pointer;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: #fff; position: relative; overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-go::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
        }
        .btn-go:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .btn-go:active { transform: translateY(0); }
        .btn-go:disabled { opacity: 0.5; cursor: wait; transform: none; box-shadow: none; }

        /* ========== LOADING ========== */
        .loader {
            display: none; text-align: center; padding: 48px 0;
        }
        .loader.on { display: block; }
        .dot-wave { display: inline-flex; gap: 6px; margin-bottom: 16px; }
        .dot-wave span {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--primary); animation: wave 1.2s ease-in-out infinite;
        }
        .dot-wave span:nth-child(2) { animation-delay: 0.1s; }
        .dot-wave span:nth-child(3) { animation-delay: 0.2s; }
        @keyframes wave {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-12px); opacity: 1; }
        }
        .loader p { color: var(--text-3); font-size: 0.9em; }

        /* ========== RESULTS ========== */
        .results { display: none; animation: fadeUp 0.4s ease; }
        .results.on { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-bar {
            display: flex; gap: 4px; background: #f1f5f9;
            padding: 4px; border-radius: 14px; margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1; padding: 10px 0; border-radius: 12px;
            text-align: center; cursor: pointer;
            font-size: 0.88em; font-weight: 600; color: var(--text-3);
            transition: all 0.15s; border: none; background: none;
        }
        .tab-btn.on { background: #fff; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .tab-btn:hover:not(.on) { color: var(--text-2); }

        .tab-pane { display: none; animation: fadeUp 0.3s ease; }
        .tab-pane.on { display: block; }

        /* Score */
        .score-wrap {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0;
        }
        .score-ring {
            width: 160px; height: 160px; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .score-ring svg { position: absolute; transform: rotate(-90deg); }
        .score-ring circle {
            fill: none; stroke-width: 8; stroke-linecap: round;
        }
        .score-ring .bg { stroke: #e2e8f0; }
        .score-ring .fg { stroke: url(#grad); transition: stroke-dashoffset 1s ease; }
        .score-num { font-size: 3em; font-weight: 800; z-index: 1; }
        .score-sub { font-size: 0.85em; color: var(--text-3); z-index: 1; }
        .score-desc {
            margin-top: 16px; padding: 10px 20px; background: #f8fafc;
            border-radius: 10px; font-size: 0.9em; color: var(--text-2);
            text-align: center; max-width: 500px;
        }

        .dims {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            margin-top: 24px; width: 100%;
        }
        .dim {
            background: #f8fafc; border-radius: 12px; padding: 16px;
        }
        .dim-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .dim-name { font-size: 0.85em; font-weight: 600; color: var(--text-2); }
        .dim-val { font-size: 0.95em; font-weight: 700; }
        .dim-track { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .dim-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Keywords */
        .kw-rate {
            text-align: center; padding: 20px 0;
        }
        .kw-rate-num { font-size: 2.6em; font-weight: 800; }
        .kw-rate-label { font-size: 0.85em; color: var(--text-3); margin-top: 2px; }
        .kw-section { margin-bottom: 18px; }
        .kw-label { font-weight: 600; font-size: 0.88em; margin-bottom: 8px; color: var(--text-2); }
        .kw-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .kw-tag {
            padding: 5px 14px; border-radius: 100px; font-size: 0.82em; font-weight: 600;
        }
        .kw-tag.hit { background: #dcfce7; color: #15803d; }
        .kw-tag.miss { background: #fee2e2; color: #dc2626; }
        .kw-tip {
            padding: 14px 18px; background: #fffbeb; border-radius: 12px;
            font-size: 0.88em; color: #92400e; border: 1px solid #fde68a;
        }

        /* Analysis */
        .md-body { line-height: 1.85; font-size: 0.95em; }
        .md-body h2 {
            font-size: 1.2em; font-weight: 700; margin: 28px 0 12px;
            padding-bottom: 8px; border-bottom: 2px solid #f1f5f9;
        }
        .md-body h3 { font-size: 1.05em; margin: 18px 0 8px; font-weight: 600; }
        .md-body ul, .md-body ol { padding-left: 22px; }
        .md-body li { margin-bottom: 6px; }
        .md-body strong { color: var(--primary-dark); }
        .md-body code {
            background: #f1f5f9; padding: 2px 6px; border-radius: 4px;
            font-size: 0.9em;
        }

        .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-sm {
            padding: 10px 20px; border-radius: 10px;
            font-size: 0.88em; font-weight: 600; cursor: pointer;
            border: 1.5px solid var(--border); background: #fff; color: var(--text-2);
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.15s;
        }
        .btn-sm:hover { border-color: var(--primary); color: var(--primary); background: #f5f3ff; }

        /* Footer */
        footer {
            text-align: center; padding: 32px; color: var(--text-3); font-size: 0.82em;
        }
        footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

<!-- SVG defs -->
<svg width="0" height="0"><defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#6366f1"/>
        <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
</defs></svg>

<nav class="nav">
    <div class="nav-brand">
        <i class="ri-file-user-fill" style="font-size:1.3em"></i>
        AI Resume Optimizer
    </div>
    <div class="nav-links">
        <a href="javascript:void(0)" onclick="toggleTheme()" id="themeBtn" title="切换深色模式">
            <i class="ri-moon-fill"></i>
        </a>
        <a href="https://github.com/tangp333/ai-resume-optimizer" target="_blank">
            <i class="ri-github-fill"></i> Star on GitHub
        </a>
    </div>
</nav>

<div class="hero">
    <h1>AI 简历优化器</h1>
    <p>上传简历与岗位 JD，AI 深度分析匹配度、关键词覆盖，生成优化方案</p>
    <div class="feature-pills">
        <span class="pill purple"><i class="ri-bar-chart-box-fill"></i> 智能评分</span>
        <span class="pill green"><i class="ri-key-2-fill"></i> ATS 关键词</span>
        <span class="pill amber"><i class="ri-scales-3-fill"></i> 多岗对比</span>
        <span class="pill rose"><i class="ri-file-pdf-2-fill"></i> PDF 导出</span>
    </div>
</div>

<div class="main">
    <!-- 输入 -->
    <div class="input-row">
        <div class="panel">
            <div class="panel-head">
                <span class="panel-icon blue"><i class="ri-file-text-fill"></i></span>
                你的简历
            </div>
            <div class="dropzone" id="dropzone" onclick="document.getElementById('fileIn').click()">
                <i class="ri-upload-cloud-2-line"></i>
                <p>点击上传或拖拽文件（.txt / .docx / .pdf）</p>
                <input type="file" id="fileIn" accept=".txt,.docx,.pdf">
            </div>
            <div class="file-tag" id="fileTag"></div>
            <textarea id="resume" placeholder="或直接粘贴简历内容...&#10;&#10;教育背景、技能、项目经历、自我评价"></textarea>
        </div>

        <div class="panel">
            <div class="panel-head">
                <span class="panel-icon purple"><i class="ri-briefcase-fill"></i></span>
                目标岗位 JD
            </div>
            <textarea id="jd1" placeholder="粘贴目标岗位的职位描述...&#10;&#10;岗位要求、技能需求、工作内容等" style="min-height:272px"></textarea>
            <div class="extra-trigger" onclick="toggleExtra()">
                <i class="ri-add-circle-line"></i> 添加更多岗位进行对比
            </div>
            <div class="extra-jds" id="extraJds">
                <textarea id="jd2" placeholder="岗位 2 的 JD..." style="min-height:110px;margin-top:8px"></textarea>
                <textarea id="jd3" placeholder="岗位 3 的 JD..." style="min-height:110px;margin-top:8px"></textarea>
            </div>
        </div>
    </div>

    <button class="btn-go" id="goBtn" onclick="go()">
        <i class="ri-sparkling-2-fill"></i> 开始智能分析
    </button>

    <!-- Loading -->
    <div class="loader" id="loader">
        <div class="dot-wave"><span></span><span></span><span></span></div>
        <p id="loaderMsg">AI 正在深度分析中...</p>
    </div>

    <!-- Results -->
    <div class="results" id="results">
        <div class="tab-bar">
            <button class="tab-btn on" data-tab="score"><i class="ri-bar-chart-box-fill"></i> 评分</button>
            <button class="tab-btn" data-tab="kw"><i class="ri-key-2-fill"></i> 关键词</button>
            <button class="tab-btn" data-tab="analysis"><i class="ri-lightbulb-fill"></i> 优化建议</button>
            <button class="tab-btn" data-tab="compare"><i class="ri-scales-3-fill"></i> 多岗对比</button>
        </div>

        <!-- Score -->
        <div class="tab-pane on" id="pane-score">
            <div class="panel">
                <div class="score-wrap">
                    <div class="score-ring">
                        <svg width="160" height="160"><circle class="bg" cx="80" cy="80" r="70"/><circle class="fg" id="ringFg" cx="80" cy="80" r="70" stroke-dasharray="440" stroke-dashoffset="440"/></svg>
                        <span class="score-num" id="scoreNum">--</span>
                    </div>
                    <span class="score-sub">/ 100</span>
                    <div class="score-desc" id="scoreDesc"></div>
                </div>
                <div class="dims" id="dims"></div>
            </div>
        </div>

        <!-- Keywords -->
        <div class="tab-pane" id="pane-kw">
            <div class="panel">
                <div class="kw-rate">
                    <span class="kw-rate-num" id="kwRateNum">--%</span>
                    <div class="kw-rate-label">ATS 关键词覆盖率</div>
                </div>
                <div class="kw-section">
                    <div class="kw-label">✅ 已匹配关键词</div>
                    <div class="kw-tags" id="kwHit"></div>
                </div>
                <div class="kw-section">
                    <div class="kw-label">❌ 缺失关键词</div>
                    <div class="kw-tags" id="kwMiss"></div>
                </div>
                <div class="kw-tip" id="kwTip" style="display:none"></div>
            </div>
        </div>

        <!-- Analysis -->
        <div class="tab-pane" id="pane-analysis">
            <div class="panel">
                <div class="md-body" id="analysisBody"></div>
                <div class="actions">
                    <button class="btn-sm" onclick="doExport()"><i class="ri-file-pdf-2-fill"></i> 导出 PDF 报告</button>
                </div>
            </div>
        </div>

        <!-- Compare -->
        <div class="tab-pane" id="pane-compare">
            <div class="panel">
                <div class="md-body" id="compareBody">
                    <p style="color:var(--text-3)">输入多个岗位 JD 后点击分析，自动进行多岗位对比。</p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    ⭐ 觉得好用？欢迎到 <a href="https://github.com/tangp333/ai-resume-optimizer" target="_blank">GitHub</a> 点个 Star &nbsp;·&nbsp; Powered by AI
</footer>

<script>
// ========== Tab ==========
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('on'));
        btn.classList.add('on');
        document.getElementById('pane-' + btn.dataset.tab).classList.add('on');
    });
});

// ========== 文件上传 ==========
document.getElementById('fileIn').addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) {
        document.getElementById('fileTag').textContent = '📎 ' + f.name;
        document.getElementById('fileTag').style.display = 'block';
    }
});

// 拖拽
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) {
        document.getElementById('fileIn').files = e.dataTransfer.files;
        document.getElementById('fileTag').textContent = '📎 ' + f.name;
        document.getElementById('fileTag').style.display = 'block';
    }
});

// ========== 额外岗位 ==========
function toggleExtra() {
    document.getElementById('extraJds').classList.toggle('open');
}

// ========== 分析 ==========
let rawAnalysis = '';

async function go() {
    const resume = document.getElementById('resume').value.trim();
    const jd = document.getElementById('jd1').value.trim();
    const file = document.getElementById('fileIn').files[0];

    if (!resume && !file) { alert('请输入或上传简历'); return; }
    if (!jd) { alert('请输入岗位 JD'); return; }

    const btn = document.getElementById('goBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ri-loader-4-line" style="animation:spin 1s linear infinite"></i> 分析中...';

    document.getElementById('loader').classList.add('on');
    document.getElementById('results').classList.remove('on');

    try {
        const fd = new FormData();
        fd.append('resume', resume);
        fd.append('jd', jd);
        if (file) fd.append('file', file);

        document.getElementById('loaderMsg').textContent = 'AI 正在分析评分与关键词...';
        const res = await fetch('/api/analyze', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }

        renderScore(data.score);
        renderKW(data.keywords);
        rawAnalysis = data.analysis || '';
        document.getElementById('analysisBody').innerHTML = marked.parse(rawAnalysis);

        // 多岗
        const j2 = document.getElementById('jd2').value.trim();
        const j3 = document.getElementById('jd3').value.trim();
        const all = [jd, j2, j3].filter(Boolean);
        if (all.length >= 2) {
            document.getElementById('loaderMsg').textContent = '正在对比岗位...';
            const cr = await fetch('/api/compare', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ resume, jds: all })
            });
            const cd = await cr.json();
            document.getElementById('compareBody').innerHTML = marked.parse(cd.result || '');
        }

        document.getElementById('results').classList.add('on');
    } catch (e) {
        alert('出错了：' + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-sparkling-2-fill"></i> 开始智能分析';
        document.getElementById('loader').classList.remove('on');
    }
}

function renderScore(d) {
    const s = d.total_score || 0;
    document.getElementById('scoreNum').textContent = s;
    document.getElementById('scoreDesc').textContent = d.summary || '';
    const offset = 440 - (440 * s / 100);
    document.getElementById('ringFg').style.strokeDashoffset = offset;

    const el = document.getElementById('dims');
    el.innerHTML = '';
    for (const [k, v] of Object.entries(d.dimensions || {})) {
        const color = v >= 80 ? 'var(--green)' : v >= 60 ? 'var(--orange)' : 'var(--red)';
        el.innerHTML += `<div class="dim">
            <div class="dim-top"><span class="dim-name">${k}</span><span class="dim-val" style="color:${color}">${v}</span></div>
            <div class="dim-track"><div class="dim-fill" style="width:${v}%"></div></div>
        </div>`;
    }
}

function renderKW(d) {
    document.getElementById('kwRateNum').textContent = (d.coverage_rate || 0) + '%';
    const hit = document.getElementById('kwHit');
    hit.innerHTML = (d.matched || []).map(k => `<span class="kw-tag hit">${k}</span>`).join('') || '<span style="color:var(--text-3);font-size:0.85em">—</span>';
    const miss = document.getElementById('kwMiss');
    miss.innerHTML = (d.missing || []).map(k => `<span class="kw-tag miss">${k}</span>`).join('') || '<span style="color:var(--text-3);font-size:0.85em">—</span>';
    const tip = document.getElementById('kwTip');
    if (d.suggestions) { tip.style.display = 'block'; tip.textContent = d.suggestions; }
    else { tip.style.display = 'none'; }
}

async function doExport() {
    if (!rawAnalysis) { alert('请先分析'); return; }
    const res = await fetch('/api/export-pdf', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ content: rawAnalysis })
    });
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '简历优化报告.pdf';
    a.click();
}

// ========== 深色模式 ==========
function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    const icon = document.querySelector('#themeBtn i');
    icon.className = isDark ? 'ri-moon-fill' : 'ri-sun-fill';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
// 初始化
(function() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.querySelector('#themeBtn i').className = 'ri-sun-fill';
    }
})();
</script>
